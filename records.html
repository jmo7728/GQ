<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check Records</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">
        <a href="index.html">
          <img src="images/logo.png" alt="Organization Logo" class="logo-img">
        </a>
      </div>
      <ul class="nav-links">
        <li><a href="join.html">How to Join</a></li>
        <li><a href="eboard.html">E-Board</a></li>

      </ul>

  <section class="records-section">
    <div class="records-container">
      <p class="records-label">MEMBERSHIP RECORDS</p>
      <h1>Check Your Standing</h1>
      <p class="records-subtext">
        Enter your email to view your current Fall 2026 membership information and progress.
      </p>

      <div class="records-card">
        <div class="form-group">
          <label for="emailSearch">Email</label>
          <input type="email" id="emailSearch" placeholder="Enter your email" />
        </div>

        <button id="searchBtn" class="records-btn">Check Record</button>

        <div id="result" class="records-result" style="display: none;"></div>
      </div>
    </div>
  </section>

  <script src="js/records.js"></script>
